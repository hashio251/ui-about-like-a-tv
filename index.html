<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./assets/css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ui about like a tv</title>
</head>

<body>
  <div class="container">
    <div class="tv-header-container">
    </div>
    <div class="tv-main-container">
      <div class="tv-box">
        <div class="tv-display is-off">
        </div>
      </div>
      <div class="btn">
        <div class="number-btn">
          <button class="btn1 button">1</button>
          <button class="btn2 button">2</button>
          <button class="btn3 button">3</button>
          <button class="btn4 button">4</button>
          <button class="btn5 button">5</button>
          <button class="btn6 button">6</button>
          <button class="btn7 button">7</button>
          <button class="btn8 button">8</button>
          <button class="btn9 button">9</button>
        </div>
        <div class="power-btn">
          <button class="power-button power-on">ON</button>
          <button class="power-button power-off">OFF</button>
        </div>
      </div>
    </div>
    <div class="tv-side-container">
    </div>
    <div class="tv-bottom-container">
    </div>
  </div>
  <script src="./assets/js/main.js"></script>
</body>

</html>
